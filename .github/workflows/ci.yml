name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate HTML structure
      run: |
        echo "Validating HTML structure..."
        # Check for required files
        if [ ! -f "index.html" ]; then
          echo "❌ index.html missing"
          exit 1
        fi
        if [ ! -f "architecture.svg" ]; then
          echo "❌ architecture.svg missing"
          exit 1
        fi
        if [ ! -f "Dockerfile" ]; then
          echo "❌ Dockerfile missing"
          exit 1
        fi
        if [ ! -f "nginx.conf" ]; then
          echo "❌ nginx.conf missing"
          exit 1
        fi
        
        # Check HTML basics
        echo "Checking HTML structure..."
        if ! grep -q "<title>" index.html; then
          echo "❌ No title tag found"
          exit 1
        fi
        
        # Check div balance (rough check)
        open_divs=$(grep -c "<div" index.html)
        close_divs=$(grep -c "</div>" index.html)
        if [ $open_divs -ne $close_divs ]; then
          echo "❌ Div tags unbalanced: $open_divs opening, $close_divs closing"
          exit 1
        fi
        
        # Check SVG reference
        if ! grep -q "architecture.svg" index.html; then
          echo "❌ SVG file not referenced in HTML"
          exit 1
        fi
        
        echo "✅ HTML validation passed"
    
    - name: Validate Dockerfile
      run: |
        echo "Validating Dockerfile..."
        if ! grep -q "FROM nginx" Dockerfile; then
          echo "❌ Dockerfile should be based on nginx"
          exit 1
        fi
        if ! grep -q "COPY index.html" Dockerfile; then
          echo "❌ Dockerfile should copy index.html"
          exit 1
        fi
        echo "✅ Dockerfile validation passed"
    
    - name: Validate nginx configuration
      run: |
        echo "Validating nginx.conf..."
        if ! grep -q "server {" nginx.conf; then
          echo "❌ nginx.conf missing server block"
          exit 1
        fi
        if ! grep -q "listen 80" nginx.conf; then
          echo "❌ nginx.conf missing listen directive"
          exit 1
        fi
        if ! grep -q "root /usr/share/nginx/html" nginx.conf; then
          echo "❌ nginx.conf missing root directive"
          exit 1
        fi
        echo "✅ nginx.conf validation passed"
    
    - name: Validate Kubernetes manifests
      run: |
        echo "Validating Kubernetes manifests..."
        if [ ! -d "kubernetes" ]; then
          echo "❌ kubernetes directory missing"
          exit 1
        fi
        
        for file in kubernetes/deployment.yaml kubernetes/service.yaml kubernetes/ingress.yaml; do
          if [ ! -f "$file" ]; then
            echo "❌ Missing Kubernetes manifest: $file"
            exit 1
          fi
          
          # Basic YAML validation
          if ! grep -q "apiVersion:" "$file"; then
            echo "❌ $file missing apiVersion"
            exit 1
          fi
          if ! grep -q "kind:" "$file"; then
            echo "❌ $file missing kind"
            exit 1
          fi
        done
        
        echo "✅ Kubernetes manifests validation passed"

  build:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Harbor
      run: |
        echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.niche-robotics.tech \
          -u "${{ secrets.HARBOR_USERNAME }}" \
          --password-stdin
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          harbor.niche-robotics.tech/library/mlir-debugger-website:latest
          harbor.niche-robotics.tech/library/mlir-debugger-website:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Update deployment manifest
      run: |
        # Update the deployment.yaml with the new image tag
        sed -i "s|harbor.niche-robotics.tech/library/mlir-debugger-website:latest|harbor.niche-robotics.tech/library/mlir-debugger-website:${{ github.sha }}|g" kubernetes/deployment.yaml
        echo "Updated deployment.yaml with image tag: ${{ github.sha }}"
    
    - name: Deploy to Kubernetes
      env:
        KUBECONFIG: ${{ secrets.KUBECONFIG }}
      run: |
        echo "Deploying to Kubernetes..."
        
        # Create kubeconfig file
        mkdir -p ~/.kube
        echo "$KUBECONFIG" > ~/.kube/config
        
        # Apply Kubernetes manifests
        kubectl apply -f kubernetes/ --namespace=default
        
        # Wait for rollout
        kubectl rollout status deployment/mlir-debugger-website --namespace=default --timeout=300s
        
        echo "✅ Deployment successful"
    
    - name: Verify deployment
      env:
        KUBECONFIG: ${{ secrets.KUBECONFIG }}
      run: |
        echo "Verifying deployment..."
        
        # Create kubeconfig file
        mkdir -p ~/.kube
        echo "$KUBECONFIG" > ~/.kube/config
        
        # Check pods
        kubectl get pods --namespace=default -l app=mlir-debugger-website
        
        # Check service
        kubectl get service mlir-debugger-website --namespace=default
        
        # Check ingress
        kubectl get ingress mlir-debugger-website --namespace=default
        
        echo "✅ Verification complete"

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Send deployment notification
      if: needs.build.result == 'success'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🚀 Website Deployment Successful!
          
          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
          
          ✅ Validation passed
          ✅ Docker image built and pushed
          ✅ Kubernetes deployment updated
          
          Live at: https://www.niche-robotics.tech
          
          View workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    
    - name: Send failure notification
      if: needs.build.result == 'failure'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          ❌ Website Deployment Failed!
          
          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
          
          View workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          Please check the workflow logs for details.