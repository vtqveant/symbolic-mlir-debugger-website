<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
            <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
            <feMerge>
                <feMergeNode in="offsetBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Title -->
    <text x="400" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#0f172a">MLIR Debugger Architecture</text>
    
    <!-- Layer 1: Input Sources -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="200" height="80" rx="10" ry="10" fill="url(#grad1)" filter="url(#shadow)" opacity="0.9"/>
        <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">AI Coding Agents</text>
        <text x="100" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">GPT, Claude, etc.</text>
        <circle cx="200" cy="40" r="8" fill="#10b981"/>
    </g>
    
    <g transform="translate(275, 80)">
        <rect x="0" y="0" width="200" height="80" rx="10" ry="10" fill="url(#grad1)" filter="url(#shadow)" opacity="0.9"/>
        <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">IDEs & Editors</text>
        <text x="100" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">VSCode, IntelliJ, etc.</text>
        <circle cx="200" cy="40" r="8" fill="#10b981"/>
    </g>
    
    <g transform="translate(500, 80)">
        <rect x="0" y="0" width="200" height="80" rx="10" ry="10" fill="url(#grad1)" filter="url(#shadow)" opacity="0.9"/>
        <text x="100" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">CI/CD Pipelines</text>
        <text x="100" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">GitHub Actions, Jenkins</text>
        <circle cx="200" cy="40" r="8" fill="#10b981"/>
    </g>
    
    <!-- Arrows to Core -->
    <path d="M250,120 L250,180" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M475,120 L475,180" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M700,120 L700,180" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    
    <!-- Core Service -->
    <g transform="translate(250, 180)">
        <rect x="0" y="0" width="300" height="120" rx="15" ry="15" fill="url(#grad2)" filter="url(#shadow)" opacity="0.9"/>
        <text x="150" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="white">MLIR Debugger Core</text>
        <text x="150" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">DAP Protocol Server</text>
        <text x="150" y="85" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">Symbolic Execution Engine</text>
        <circle cx="300" cy="60" r="8" fill="#f59e0b"/>
    </g>
    
    <!-- Arrows to Backend -->
    <path d="M400,300 L400,340" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    
    <!-- Backend Services -->
    <g transform="translate(100, 340)">
        <rect x="0" y="0" width="180" height="80" rx="10" ry="10" fill="#f8fafc" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
        <text x="90" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0f172a">MLIR Parser</text>
        <text x="90" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Syntax Validation</text>
    </g>
    
    <g transform="translate(310, 340)">
        <rect x="0" y="0" width="180" height="80" rx="10" ry="10" fill="#f8fafc" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
        <text x="90" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Z3 Solver</text>
        <text x="90" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Constraint Solving</text>
    </g>
    
    <g transform="translate(520, 340)">
        <rect x="0" y="0" width="180" height="80" rx="10" ry="10" fill="#f8fafc" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
        <text x="90" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Trace Storage</text>
        <text x="90" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Execution Traces</text>
    </g>
    
    <!-- Arrows between backend services -->
    <path d="M280,380 L310,380" stroke="#64748b" stroke-width="1" stroke-dasharray="5,5" fill="none"/>
    <path d="M490,380 L520,380" stroke="#64748b" stroke-width="1" stroke-dasharray="5,5" fill="none"/>
    
    <!-- Output -->
    <g transform="translate(310, 440)">
        <rect x="0" y="0" width="180" height="60" rx="10" ry="10" fill="#10b981" filter="url(#shadow)" opacity="0.9"/>
        <text x="90" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="white">Debug Reports</text>
        <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">JSON, HTML, Visualizations</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(600, 400)">
        <rect x="0" y="0" width="180" height="100" rx="8" ry="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
        <text x="90" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Legend</text>
        
        <circle cx="20" cy="40" r="6" fill="#10b981"/>
        <text x="35" y="45" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Input Source</text>
        
        <circle cx="20" cy="60" r="6" fill="#f59e0b"/>
        <text x="35" y="65" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Processing</text>
        
        <circle cx="20" cy="80" r="6" fill="#06b6d4"/>
        <text x="35" y="85" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Backend Service</text>
    </g>
    
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
        </marker>
    </defs>
</svg>