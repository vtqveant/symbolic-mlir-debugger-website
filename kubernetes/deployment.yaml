apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlir-debugger-website
  namespace: default
  labels:
    app: mlir-debugger-website
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mlir-debugger-website
  template:
    metadata:
      labels:
        app: mlir-debugger-website
        component: frontend
    spec:
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: website
        image: harbor.niche-robotics.tech/library/mlir-debugger-website:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 1
        env:
        - name: NGINX_ENVSUBST_TEMPLATE_SUFFIX
          value: ".conf"
        - name: NGINX_ENVSUBST_OUTPUT_DIR
          value: /etc/nginx/conf.d